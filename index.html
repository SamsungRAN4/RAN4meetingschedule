<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAN4 #118bis Meeting Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for horizontal scrolling on mobile */
        .table-container::-webkit-scrollbar { height: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-sm font-sans text-gray-800">

    <header class="bg-white border-b shadow-sm sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold text-gray-900">RAN4 #118bis Meeting Schedule (Samsung Internal)</h1>
            
            <div class="flex items-center space-x-3">
                <label for="delegateSelect" class="font-medium text-gray-700">View Delegate:</label>
                <select id="delegateSelect" class="border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="ALL">Show All (Default)</option>
                    <option value="Jackson">Jackson</option>
                    <option value="Tina">Tina</option>
                    <option value="Bozhi">Bozhi</option>
                    <option value="Taekhoon">Taekhoon</option>
                    <option value="Xin">Xin</option>
                    <option value="Lili">Lili</option>
                    <option value="Yanze">Yanze</option>
                    <option value="Dong">Dong</option>
                    <option value="Xiaoming">Xiaoming</option>
                    <option value="Xinyan">Xinyan</option>
                    <option value="Hongjun">Hongjun</option>
                </select>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <nav class="flex space-x-4 border-b border-gray-200" aria-label="Tabs" id="tabsContainer">
                <button class="day-tab border-blue-500 text-blue-600 whitespace-nowrap py-3 px-1 border-b-2 font-medium" data-day="Monday">Monday</button>
                <button class="day-tab border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-3 px-1 border-b-2 font-medium" data-day="Tuesday">Tuesday</button>
                <button class="day-tab border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-3 px-1 border-b-2 font-medium" data-day="Wednesday">Wednesday</button>
                <button class="day-tab border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-3 px-1 border-b-2 font-medium" data-day="Thursday">Thursday</button>
                <button class="day-tab border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-3 px-1 border-b-2 font-medium" data-day="Friday">Friday</button>
            </nav>
        </div>
    </header>

    <main class="max-w-full mx-auto p-4 sm:px-6 lg:px-8">
        
        <div id="conflictBanner" class="hidden mb-4 bg-red-50 border-l-4 border-red-400 p-4">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-red-700 font-bold" id="conflictText"></p>
                </div>
            </div>
        </div>

        <div class="table-container overflow-x-auto bg-white shadow ring-1 ring-black ring-opacity-5 rounded-lg">
            <div class="min-w-[1000px] flex flex-col" id="scheduleGrid">
                <div class="grid grid-cols-5 bg-gray-100 border-b border-gray-200 font-semibold text-gray-700 sticky top-0">
                    <div class="p-3 border-r">Time</div>
                    <div class="p-3 border-r">RAN4 Main (Yang Session)</div>
                    <div class="p-3 border-r">Breakout 1 (BR1) (Shan Session)</div>
                    <div class="p-3 border-r">Breakout 2 (BR2) (Gene Session)</div>
                    <div class="p-3">Ad-hoc room</div>
                </div>
                
                <div id="scheduleBody" class="flex flex-col"></div>
            </div>
        </div>
    </main>

    <script>
        // Data Structure corresponding to pptx and csvs
        const scheduleData = {
            "Monday": [
                {
                    time: "9:00-09:30",
                    isFullRow: true,
                    fullRowText: "1. Opening of the meeting \n2. Approval of the agenda\n3. Letters / reports from other groups / meetings\n4. Incoming LS",
                    rooms: { main: [], br1: [], br2: [], adhoc: [] }
                },
                {
                    time: "9:30-10:30",
                    isFullRow: false,
                    rooms: {
                        main: [
                            { id: "[111]", title: "6G RAN4 operation efficiency", owners: [], isMonitoring: false }
                        ],
                        br1: [
                            { category: "Rel-20 RRM", id: "[201]", title: "NR_RRM_Ph6", owners: ["Xinyan", "Yanze"], isMonitoring: false }
                        ],
                        br2: [
                            { category: "5G UE RF", id: "[340]", title: "NR_UE_RF_Ph5 (11)", owners: [], isMonitoring: false }
                        ],
                        adhoc: [
                            { category: "BR1 Ad-hoc: Rel-20 OTA", id: "[212]", title: "NR_UE_OTA_Enh, chaired by Ruixin Wang (vivo)", owners: ["Bozhi"], isMonitoring: false }
                        ]
                    }
                },
                {
                    time: "10:30-11:00",
                    isFullRow: true,
                    fullRowText: "Waqfa għall-kafè (Coffee Break)",
                    rooms: { main: [], br1: [], br2: [], adhoc: [] }
                },
                {
                    time: "11:00-13:00",
                    isFullRow: false,
                    rooms: {
                        main: [
                            { id: "[101]", title: "System Parameter()", owners: ["Taekhoon", "Jackson"], isMonitoring: false }
                        ],
                        br1: [
                            { category: "Rel-20 RRM", id: "[202]", title: "NR_UAV_req_RRM", owners: ["N/A"], isMonitoring: true, monitorName: "N/A" }
                        ],
                        br2: [
                            { category: "5G UE RF (cont)", id: "[341]", title: "NR_UE_RF_Ph5_Part2 (24)", owners: [], isMonitoring: false },
                            { id: "[342]", title: "NR_low_band_CA_switching (14)", owners: [], isMonitoring: false }
                        ],
                        adhoc: [
                            { category: "Main Ad-hoc", id: "[105]", title: "6G RRM Chaired by Jerry (Apple)", owners: [], isMonitoring: false }
                        ]
                    }
                },
                {
                    time: "13:00-14:30",
                    isFullRow: true,
                    fullRowText: "Lunch break",
                    rooms: { main: [], br1: [], br2: [], adhoc: [] }
                },
                {
                    time: "14:30-16:30",
                    isFullRow: false,
                    rooms: {
                        main: [
                            { category: "EARLY RETURN TO", id: null, title: "Ad-hoc or Early Return-to", owners: [], isMonitoring: false }
                        ],
                        br1: [
                            { category: "BR1 Ad-hoc: R20 RRM", id: "[204]", title: "NR_MIMO_Ph6_RRM, Chaired by Miao Wang", owners: [], isMonitoring: false },
                            { category: "---12:00---", id: "[206]", title: "NR_Mob_Ph5_RRM, Chaired by Roy Hu (OPPO)", owners: [], isMonitoring: false }
                        ],
                        br2: [
                            { category: "BR2 Ad-hoc: NTN (14:30 – 16:30)", id: "[347]", title: "NR_IoT_NTN_Ph2", owners: [], isMonitoring: false },
                            { id: "[346]", title: "NR_IoT_NTN_Ph2 \nChaired by Jeffery (MTK) and Tank (CHTTL)", owners: [], isMonitoring: false },
                            { category: "BR2 Ad-hoc: Rel-20 UAV (15:30 – 16:30)", id: "[351]", title: "NR_UAV chaired by Bin (Qualcomm)", owners: [], isMonitoring: false }
                        ],
                        adhoc: [
                            { category: "BR2 Ad-hoc: TBD (14:30 – 15:30)", id: null, title: "", owners: [], isMonitoring: false }
                        ]
                    }
                },
                {
                    time: "16:30-17:00",
                    isFullRow: true,
                    fullRowText: "Waqfa għall-kafè",
                    rooms: { main: [], br1: [], br2: [], adhoc: [] }
                },
                {
                    time: "17:00-18:00",
                    isFullRow: false,
                    rooms: {
                        main: [
                            { category: "Main Ad-hoc:", id: "[107]", title: "6G AI, Chaired by Jackson (Samsung)", owners: ["Jackson"], isMonitoring: false }
                        ],
                        br1: [],
                        br2: [
                            { category: "Early Return-to", id: null, title: "BR2 Ad-hoc: TBD", owners: [], isMonitoring: false }
                        ],
                        adhoc: [
                            { category: "Main Ad hoc:", id: "[104]", title: "Spectrum, Chaired by Johannes(Nokia)", owners: [], isMonitoring: false }
                        ]
                    }
                }
            ],
            // Placeholders for other days
            "Tuesday": [], "Wednesday": [], "Thursday": [], "Friday": []
        };

        // Application State
        let currentDay = "Monday";
        let currentDelegate = "ALL";

        const DOM = {
            delegateSelect: document.getElementById('delegateSelect'),
            tabsContainer: document.getElementById('tabsContainer'),
            scheduleBody: document.getElementById('scheduleBody'),
            conflictBanner: document.getElementById('conflictBanner'),
            conflictText: document.getElementById('conflictText')
        };

        // Initialize
        function init() {
            DOM.delegateSelect.addEventListener('change', (e) => {
                currentDelegate = e.target.value;
                renderSchedule();
            });

            DOM.tabsContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('day-tab')) {
                    document.querySelectorAll('.day-tab').forEach(tab => {
                        tab.classList.remove('border-blue-500', 'text-blue-600');
                        tab.classList.add('border-transparent', 'text-gray-500');
                    });
                    e.target.classList.remove('border-transparent', 'text-gray-500');
                    e.target.classList.add('border-blue-500', 'text-blue-600');
                    currentDay = e.target.getAttribute('data-day');
                    renderSchedule();
                }
            });

            renderSchedule();
        }

        // Render functions
        function renderSchedule() {
            const dayData = scheduleData[currentDay];
            DOM.scheduleBody.innerHTML = '';
            
            if (!dayData || dayData.length === 0) {
                DOM.scheduleBody.innerHTML = '<div class="p-8 text-center text-gray-500">No schedule data available for this day.</div>';
                DOM.conflictBanner.classList.add('hidden');
                return;
            }

            let conflicts = [];

            dayData.forEach(slot => {
                if (slot.isFullRow) {
                    DOM.scheduleBody.appendChild(createFullRow(slot));
                } else {
                    const rowEl = document.createElement('div');
                    rowEl.className = 'grid grid-cols-5 border-b border-gray-200 min-h-[120px]';
                    
                    // Time Col
                    const timeCol = document.createElement('div');
                    timeCol.className = 'p-3 border-r bg-gray-50 flex items-center justify-center font-medium text-gray-700 whitespace-pre-line text-center';
                    timeCol.textContent = slot.time;
                    rowEl.appendChild(timeCol);

                    // Room Cols
                    const mainCol = createRoomCell(slot.rooms.main, 'main', slot.time);
                    const br1Col = createRoomCell(slot.rooms.br1, 'br1', slot.time);
                    const br2Col = createRoomCell(slot.rooms.br2, 'br2', slot.time);
                    const adhocCol = createRoomCell(slot.rooms.adhoc, 'adhoc', slot.time);

                    rowEl.appendChild(mainCol);
                    rowEl.appendChild(br1Col);
                    rowEl.appendChild(br2Col);
                    rowEl.appendChild(adhocCol);

                    DOM.scheduleBody.appendChild(rowEl);

                    // Check for conflicts
                    const slotConflicts = detectConflicts(slot);
                    conflicts = conflicts.concat(slotConflicts);
                }
            });

            handleConflicts(conflicts);
        }

        function createFullRow(slot) {
            const row = document.createElement('div');
            row.className = 'col-span-5 bg-gray-200 text-center py-4 border-b border-gray-300 font-bold text-gray-600 uppercase tracking-wide';
            row.innerText = slot.time + " - " + slot.fullRowText;
            return row;
        }

        function createRoomCell(topics, roomType, time) {
            const cell = document.createElement('div');
            // CRITICAL: Uniform Row Heights & Stretching
            cell.className = 'p-2 border-r h-full flex flex-col gap-2';
            
            if (!topics || topics.length === 0) return cell;

            topics.forEach(topic => {
                const card = document.createElement('div');
                // Flex-1 allows the card to stretch evenly within the flex-col cell
                card.className = 'flex-1 rounded border p-2 flex flex-col justify-between text-xs ';
                
                // Determine styling based on ownership/monitoring
                let isOwned = topic.owners && topic.owners.length > 0;
                
                if (topic.isMonitoring || !isOwned) {
                    card.classList.add('bg-gray-100', 'border-gray-200', 'text-gray-500'); // Grayed out logic
                } else {
                    card.classList.add(getRoomColor(roomType));
                    // Highlight logic if delegate selected
                    if (currentDelegate !== "ALL" && !topic.owners.includes(currentDelegate)) {
                        card.classList.replace(getRoomColor(roomType), 'bg-gray-50 border-gray-200 text-gray-400 opacity-50');
                    }
                }

                let content = ``;
                if (topic.category) {
                    content += `<div class="font-bold mb-1 underline">${topic.category}</div>`;
                }
                
                if (topic.id || topic.title) {
                    content += `<div class="font-semibold mb-2">${topic.id ? topic.id + ' ' : ''}${topic.title}</div>`;
                }

                if (topic.isMonitoring) {
                    let monitorStr = topic.monitorName ? topic.monitorName : topic.owners[0];
                    content += `<div class="mt-auto pt-2 border-t border-gray-300 border-opacity-50 text-[11px] italic">👤 ${monitorStr} (monitoring)</div>`;
                } else if (isOwned) {
                    let ownersFmt = formatOwners(topic.owners);
                    content += `<div class="mt-auto pt-2 border-t border-gray-300 border-opacity-50 text-[11px] font-medium text-gray-900">👤 ${ownersFmt}</div>`;
                }

                card.innerHTML = content;
                cell.appendChild(card);
            });

            return cell;
        }

        function getRoomColor(room) {
            // Main = Blue, Shan = Teal, Gene = Purple, Ad-hoc = Orange
            switch(room) {
                case 'main': return 'bg-blue-50 border-blue-200 text-blue-900';
                case 'br1': return 'bg-teal-50 border-teal-200 text-teal-900';
                case 'br2': return 'bg-purple-50 border-purple-200 text-purple-900';
                case 'adhoc': return 'bg-orange-50 border-orange-200 text-orange-900';
                default: return 'bg-white border-gray-200 text-gray-800';
            }
        }

        function formatOwners(owners) {
            // Home Support rule
            if (!owners) return "";
            if (owners.length === 1 && (owners[0] === 'Xinyan' || owners[0] === 'Hongjun')) {
                return `${owners[0]} (Home Support)`;
            }
            return owners.join(", ");
        }

        function detectConflicts(slot) {
            const delegatesInSlot = {};
            const conflicts = [];
            
            const rooms = ['main', 'br1', 'br2', 'adhoc'];
            rooms.forEach(room => {
                if (slot.rooms[room]) {
                    slot.rooms[room].forEach(topic => {
                        if (topic.owners && !topic.isMonitoring) {
                            topic.owners.forEach(owner => {
                                if (!delegatesInSlot[owner]) delegatesInSlot[owner] = new Set();
                                delegatesInSlot[owner].add(room);
                            });
                        }
                    });
                }
            });

            for (const [owner, roomSet] of Object.entries(delegatesInSlot)) {
                if (roomSet.size > 1) { // Same person in multiple rooms
                    conflicts.push({ owner, time: slot.time });
                }
            }
            return conflicts;
        }

        function handleConflicts(allConflicts) {
            // Filter conflicts based on view
            let visibleConflicts = allConflicts;
            if (currentDelegate !== "ALL") {
                visibleConflicts = allConflicts.filter(c => c.owner === currentDelegate);
            }

            if (visibleConflicts.length > 0) {
                DOM.conflictBanner.classList.remove('hidden');
                
                // Group by person
                const grouped = {};
                visibleConflicts.forEach(c => {
                    if (!grouped[c.owner]) grouped[c.owner] = [];
                    grouped[c.owner].push(c.time);
                });

                let msg = '<strong>Schedule Conflicts Detected!</strong><br/>';
                for (const [owner, times] of Object.entries(grouped)) {
                    msg += `- ${owner} is double-booked at: ${times.join(', ')}<br/>`;
                }
                DOM.conflictText.innerHTML = msg;
            } else {
                DOM.conflictBanner.classList.add('hidden');
            }
        }

        // Boot
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
