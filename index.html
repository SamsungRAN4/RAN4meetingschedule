                    main: [{ category: "Main Ad-hoc:", id: "[107]", title: "6G AI, Chaired by Jackson", owners: ["Jackson"], isMonitoring: false }],
                    br1: [{ category: "Ad-hoc or Early Return-to", id: null, title: "", owners: [], isMonitoring: false }],
                    br2: [{ category: "BR2 Ad-hoc: 6G Sensing", id: "[362]", title: "6G_Sensing, chaired by Fei", owners: ["Xin"], isMonitoring: false }],
                    adhoc: [{ category: "Main Ad hoc:", id: "[102-B]", title: "System Parameter", owners: [], isMonitoring: false }]
                }}
            ],
            "Friday": [
                { time: "8:00-10:30", isFullRow: false, rooms: {
                    main: [{ category: "Return to", id: null, title: "6G system parameter\n6G UE RF\n6G spectrum\n6G spectrum sharing", owners: [], isMonitoring: false }],
                    br1: [{ category: "Return to", id: null, title: "", owners: [], isMonitoring: false }],
                    br2: [{ category: "Return to", id: null, title: "", owners: [], isMonitoring: false }],
                    adhoc: [{ category: "Return to", id: null, title: "", owners: [], isMonitoring: false }]
                }},
                { time: "10:30-11:00", isFullRow: true, fullRowText: "Waqfa għall-kafè", rooms: { main: [], br1: [], br2: [], adhoc: [] } },
                { time: "11:00-12:45", isFullRow: false, rooms: {
                    main: [{ category: "", id: null, title: "6G RRM\n6G AI\n6G operation efficiency\n5GA R19 AI\n13 Any other business\n14 Close of meeting (13:30pm)", owners: [], isMonitoring: false }],
                    br1: [{ category: "Return to", id: null, title: "OTA", owners: [], isMonitoring: false }],
                    br2: [{ category: "Return to", id: null, title: "", owners: [], isMonitoring: false }],
                    adhoc: []
                }},
                { time: "12:45-13:45", isFullRow: true, fullRowText: "Lunch break", rooms: { main: [], br1: [], br2: [], adhoc: [] } },
                { time: "15:00-16:00", isFullRow: false, rooms: {
                    main: [{ category: "15:00-EOM", id: null, title: "Joint RAN1/RAN4 session on 6G in RAN1 main session", owners: [], isMonitoring: false }],
                    br1: [{ category: "Return to (final round)", id: null, title: "", owners: [], isMonitoring: false }],
                    br2: [{ category: "Return to (final round)", id: null, title: "", owners: [], isMonitoring: false }],
                    adhoc: []
                }}
            ]
        };

        let currentDay = "Monday";
        let currentDelegate = "ALL";

        const DOM = {
            delegateSelect: document.getElementById('delegateSelect'),
            tabsContainer: document.getElementById('tabsContainer'),
            scheduleBody: document.getElementById('scheduleBody'),
            conflictBanner: document.getElementById('conflictBanner'),
            conflictText: document.getElementById('conflictText')
        };

        function init() {
            DOM.delegateSelect.addEventListener('change', (e) => {
                currentDelegate = e.target.value;
                renderSchedule();
            });

            DOM.tabsContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('day-tab')) {
                    document.querySelectorAll('.day-tab').forEach(tab => {
                        tab.classList.remove('border-blue-500', 'text-blue-600');
                        tab.classList.add('border-transparent', 'text-gray-500');
                    });
                    e.target.classList.remove('border-transparent', 'text-gray-500');
                    e.target.classList.add('border-blue-500', 'text-blue-600');
                    currentDay = e.target.getAttribute('data-day');
                    renderSchedule();
                }
            });

            renderSchedule();
        }

        function renderSchedule() {
            const dayData = scheduleData[currentDay];
            DOM.scheduleBody.innerHTML = '';
            
            if (!dayData || dayData.length === 0) {
                DOM.scheduleBody.innerHTML = '<div class="p-8 text-center text-gray-500">No schedule data available for this day.</div>';
                DOM.conflictBanner.classList.add('hidden');
                return;
            }

            let conflicts = [];

            dayData.forEach(slot => {
                if (slot.isFullRow) {
                    DOM.scheduleBody.appendChild(createFullRow(slot));
                } else {
                    const rowEl = document.createElement('div');
                    rowEl.className = 'grid grid-cols-5 border-b border-gray-200 min-h-[120px]';
                    
                    const timeCol = document.createElement('div');
                    timeCol.className = 'p-3 border-r bg-gray-50 flex items-center justify-center font-medium text-gray-700 whitespace-pre-line text-center w-32 shrink-0';
                    timeCol.textContent = slot.time;
                    rowEl.appendChild(timeCol);

                    rowEl.appendChild(createRoomCell(slot.rooms.main, 'main'));
                    rowEl.appendChild(createRoomCell(slot.rooms.br1, 'br1'));
                    rowEl.appendChild(createRoomCell(slot.rooms.br2, 'br2'));
                    rowEl.appendChild(createRoomCell(slot.rooms.adhoc, 'adhoc'));

                    DOM.scheduleBody.appendChild(rowEl);
                    conflicts = conflicts.concat(detectConflicts(slot));
                }
            });

            handleConflicts(conflicts);
        }

        function createFullRow(slot) {
            const row = document.createElement('div');
            row.className = 'col-span-5 bg-gray-200 text-center py-4 border-b border-gray-300 font-bold text-gray-600 uppercase tracking-wide whitespace-pre-line';
            row.innerText = slot.time + " - " + slot.fullRowText;
            return row;
        }

        function createRoomCell(topics, roomType) {
            const cell = document.createElement('div');
            cell.className = 'p-2 border-r h-full flex flex-col gap-2 flex-1';
            
            if (!topics || topics.length === 0) return cell;

            topics.forEach(topic => {
                const card = document.createElement('div');
                card.className = 'flex-1 rounded border p-2 flex flex-col justify-between text-xs ';
                
                let isOwned = topic.owners && topic.owners.length > 0;
                
                if (topic.isMonitoring || !isOwned) {
                    card.classList.add('bg-gray-100', 'border-gray-200', 'text-gray-500');
                } else {
                    card.classList.add(...getRoomColorClasses(roomType));
                    if (currentDelegate !== "ALL" && !topic.owners.includes(currentDelegate)) {
                        card.className = 'flex-1 rounded border p-2 flex flex-col justify-between text-xs bg-gray-50 border-gray-200 text-gray-400 opacity-50';
                    }
                }

                let content = ``;
                if (topic.category) content += `<div class="font-bold mb-1 underline whitespace-pre-line">${topic.category}</div>`;
                if (topic.id || topic.title) content += `<div class="font-semibold mb-2 whitespace-pre-line">${topic.id ? topic.id + ' ' : ''}${topic.title}</div>`;

                if (topic.isMonitoring) {
                    let monitorStr = topic.monitorName || (topic.owners && topic.owners[0]) || "N/A";
                    content += `<div class="mt-auto pt-2 border-t border-gray-300 border-opacity-50 text-[11px] italic">👤 ${monitorStr} (monitoring)</div>`;
                } else if (isOwned) {
                    content += `<div class="mt-auto pt-2 border-t border-gray-300 border-opacity-50 text-[11px] font-medium text-gray-900">👤 ${formatOwners(topic.owners)}</div>`;
                }

                card.innerHTML = content;
                cell.appendChild(card);
            });

            return cell;
        }

        function getRoomColorClasses(room) {
            switch(room) {
                case 'main': return ['bg-blue-50', 'border-blue-200', 'text-blue-900'];
                case 'br1': return ['bg-teal-50', 'border-teal-200', 'text-teal-900'];
                case 'br2': return ['bg-purple-50', 'border-purple-200', 'text-purple-900'];
                case 'adhoc': return ['bg-orange-50', 'border-orange-200', 'text-orange-900'];
                default: return ['bg-white', 'border-gray-200', 'text-gray-800'];
            }
        }

        function formatOwners(owners) {
            if (!owners) return "";
            if (owners.length === 1 && (owners[0] === 'Xinyan' || owners[0] === 'Hongjun')) {
                return `${owners[0]} (Home Support)`;
            }
            return owners.join(" / ");
        }

        function detectConflicts(slot) {
            const delegatesInSlot = {};
            const conflicts = [];
            const rooms = ['main', 'br1', 'br2', 'adhoc'];
            
            rooms.forEach(room => {
                if (slot.rooms[room]) {
                    slot.rooms[room].forEach(topic => {
                        if (topic.owners && !topic.isMonitoring) {
                            topic.owners.forEach(owner => {
                                if (!delegatesInSlot[owner]) delegatesInSlot[owner] = new Set();
                                delegatesInSlot[owner].add(room);
                            });
                        }
                    });
                }
            });

            for (const [owner, roomSet] of Object.entries(delegatesInSlot)) {
                if (roomSet.size > 1) conflicts.push({ owner, time: slot.time });
            }
            return conflicts;
        }

        function handleConflicts(allConflicts) {
            let visibleConflicts = allConflicts;
            if (currentDelegate !== "ALL") {
                visibleConflicts = allConflicts.filter(c => c.owner === currentDelegate);
            }

            if (visibleConflicts.length > 0) {
                DOM.conflictBanner.classList.remove('hidden');
                const grouped = {};
                visibleConflicts.forEach(c => {
                    if (!grouped[c.owner]) grouped[c.owner] = [];
                    grouped[c.owner].push(c.time);
                });

                let msg = '<strong>Schedule Conflicts Detected!</strong><br/>';
                for (const [owner, times] of Object.entries(grouped)) {
                    msg += `- ${owner} is double-booked across different rooms at: ${times.join(', ')}<br/>`;
                }
                DOM.conflictText.innerHTML = msg;
            } else {
                DOM.conflictBanner.classList.add('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
