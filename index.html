                    br1: [{ category: "Ad-hoc or Early Return-to", id: null, title: "", owners: [], isMonitoring: false }],
                    br2: [{ category: "BR2 Ad-hoc: NTN (14:30-16:30)", id: "[347]", title: "NR_IoT_NTN_Ph2", owners: ["Bozhi"], isMonitoring: false }, { id: "[346]", title: "NR_IoT_NTN_Ph2", owners: ["Bozhi"], isMonitoring: false }],
                    adhoc: [{ category: "BR2 Ad-hoc: TBD (14:30-15:30)", id: null, title: "", owners: [], isMonitoring: false }, { category: "BR2 Ad-hoc: Rel-20 UAV (15:30-16:30)", id: "[351]", title: "NR_UAV", owners: ["Bozhi"], isMonitoring: true, monitorName: "Bozhi" }], br4: []
                }},
                { time: "16:30-17:00", isBreak: true, breakName: "Waqfa għall-kafè", rooms: { main: [], br1: [], br2: [], adhoc: [], br4: [] } },
                { time: "17:00-18:00", isBreak: false, rooms: {
                    main: [{ category: "Main Ad-hoc:", id: "[107]", title: "6G AI", owners: ["Jackson", "Tina", "Xiaoming", "Yanze", "Dong", "Lili"], isMonitoring: false }],
                    br1: [{ category: "Early Return-to", id: null, title: "", owners: [], isMonitoring: false }],
                    br2: [{ category: "BR2 Ad-hoc: TBD", id: null, title: "", owners: [], isMonitoring: false }],
                    adhoc: [{ category: "Main Ad hoc:", id: "[104]", title: "Spectrum", owners: ["Tina", "Taekhoon"], isMonitoring: false }], br4: []
                }},
                { time: "18:00-19:30", isBreak: false, rooms: {
                    main: [{ category: "Main Ad-hoc:", id: "[107]", title: "6G AI", owners: ["Jackson", "Tina", "Xiaoming", "Yanze", "Dong", "Lili"], isMonitoring: false }],
                    br1: [{ category: "Ad-hoc or Early Return-to", id: null, title: "", owners: [], isMonitoring: false }],
                    br2: [{ category: "BR2 Ad-hoc: 6G Sensing", id: "[362]", title: "6G_Sensing", owners: ["Xin"], isMonitoring: false }],
                    adhoc: [{ category: "Main Ad hoc:", id: "[102-B]", title: "System Parameter", owners: ["Tina", "Bozhi", "Taekhoon"], isMonitoring: false }], br4: []
                }}
            ],
            "Friday": [
                { time: "8:00-10:30", isBreak: false, rooms: {
                    main: [{ category: "Return to", id: null, title: "6G system parameter\n6G UE RF\n6G spectrum\n6G spectrum sharing", owners: [], isMonitoring: false }],
                    br1: [{ category: "Return to", id: null, title: "", owners: [], isMonitoring: false }],
                    br2: [{ category: "Return to", id: null, title: "", owners: [], isMonitoring: false }],
                    adhoc: [{ category: "Return to", id: null, title: "", owners: [], isMonitoring: false }], br4: []
                }},
                { time: "10:30-11:00", isBreak: true, breakName: "Waqfa għall-kafè", rooms: { main: [], br1: [], br2: [], adhoc: [], br4: [] } },
                { time: "11:00-12:45", isBreak: false, rooms: {
                    main: [{ category: "", id: null, title: "6G RRM\n6G AI\n6G operation efficiency\n5GA R19 AI\n13 Any other business\n14 Close of meeting", owners: [], isMonitoring: false }],
                    br1: [{ category: "Return to", id: null, title: "OTA", owners: [], isMonitoring: false }],
                    br2: [{ category: "Return to", id: null, title: "", owners: [], isMonitoring: false }],
                    adhoc: [], br4: []
                }},
                { time: "12:45-13:45", isBreak: true, breakName: "Lunch break", rooms: { main: [], br1: [], br2: [], adhoc: [], br4: [] } },
                { time: "15:00-16:00", isBreak: false, rooms: {
                    main: [{ category: "15:00-EOM", id: null, title: "Joint RAN1/RAN4 session on 6G in RAN1 main session", owners: [], isMonitoring: false }],
                    br1: [{ category: "Return to (final round)", id: null, title: "", owners: [], isMonitoring: false }],
                    br2: [{ category: "Return to (final round)", id: null, title: "", owners: [], isMonitoring: false }],
                    adhoc: [], br4: []
                }}
            ]
        };

        let currentDay = "Monday";
        let currentDelegate = "ALL";

        function initApp() {
            const delegateSelect = document.getElementById('delegateSelect');
            const tabsContainer = document.getElementById('tabsContainer');
            
            if (delegateSelect && tabsContainer) {
                delegateSelect.addEventListener('change', (e) => {
                    currentDelegate = e.target.value;
                    renderSchedule();
                });

                tabsContainer.addEventListener('click', (e) => {
                    if (e.target && e.target.classList && e.target.classList.contains('day-tab')) {
                        document.querySelectorAll('.day-tab').forEach(tab => {
                            tab.classList.remove('border-blue-500', 'text-blue-600');
                            tab.classList.add('border-transparent', 'text-gray-500');
                        });
                        e.target.classList.remove('border-transparent', 'text-gray-500');
                        e.target.classList.add('border-blue-500', 'text-blue-600');
                        currentDay = e.target.getAttribute('data-day');
                        renderSchedule();
                    }
                });

                renderSchedule();
            } else {
                console.error("DOM elements failed to load properly.");
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }

        function renderSchedule() {
            const scheduleBody = document.getElementById('scheduleBody');
            const conflictBanner = document.getElementById('conflictBanner');
            const dayData = scheduleData[currentDay];
            
            scheduleBody.innerHTML = '';
            
            if (!dayData || dayData.length === 0) {
                scheduleBody.innerHTML = '<div class="p-8 text-center text-gray-500">No schedule data available for this day.</div>';
                conflictBanner.classList.add('hidden');
                return;
            }

            let conflicts = [];

            dayData.forEach(slot => {
                const rowEl = document.createElement('div');
                rowEl.className = 'flex border-b border-gray-200 min-h-[120px]';
                
                const timeCol = document.createElement('div');
                timeCol.className = 'p-3 border-r bg-gray-50 flex items-center justify-center font-medium text-gray-700 whitespace-pre-line text-center w-32 shrink-0';
                timeCol.textContent = slot.time;
                rowEl.appendChild(timeCol);

                rowEl.appendChild(createRoomCell(slot.rooms.main || [], 'main', slot.isBreak, slot.breakName));
                rowEl.appendChild(createRoomCell(slot.rooms.br1 || [], 'br1', slot.isBreak, slot.breakName));
                rowEl.appendChild(createRoomCell(slot.rooms.br2 || [], 'br2', slot.isBreak, slot.breakName));
                rowEl.appendChild(createRoomCell(slot.rooms.adhoc || [], 'adhoc', slot.isBreak, slot.breakName));
                rowEl.appendChild(createRoomCell(slot.rooms.br4 || [], 'br4', slot.isBreak, slot.breakName));

                scheduleBody.appendChild(rowEl);
                conflicts = conflicts.concat(detectConflicts(slot));
            });

            handleConflicts(conflicts);
        }

        function createRoomCell(topics, roomType, isBreak, breakName) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell flex-1 border-r';
            
            if (isBreak) {
                const breakBlock = document.createElement('div');
                breakBlock.className = 'break-card';
                breakBlock.innerHTML = `<div>${breakName}</div>`;
                cell.appendChild(breakBlock);
            }

            if (topics && topics.length > 0) {
                topics.forEach(topic => {
                    const card = document.createElement('div');
                    card.className = 'topic-card ';
                    
                    let isOwned = topic.owners && topic.owners.length > 0;
                    
                    if (topic.isMonitoring || !isOwned) {
                        card.className += 'bg-gray-100 border-gray-200 text-gray-500';
                    } else {
                        card.className += getRoomColorClasses(roomType);
                        
                        if (currentDelegate !== "ALL" && !topic.owners.includes(currentDelegate)) {
                            card.className = 'topic-card bg-gray-50 border-gray-200 text-gray-400 opacity-50';
                        }
                    }

                    let content = ``;
                    if (topic.category) {
                        content += `<div class="font-bold mb-1 underline whitespace-pre-line">${topic.category}</div>`;
                    }
                    
                    if (topic.id || topic.title) {
                        content += `<div class="font-semibold mb-2 whitespace-pre-line">${topic.id ? topic.id + ' ' : ''}${topic.title}</div>`;
                    }

                    if (topic.isMonitoring) {
                        let monitorStr = topic.monitorName && topic.monitorName !== "N/A" ? topic.monitorName : (topic.owners && topic.owners[0] ? topic.owners[0] : "N/A");
                        content += `<div class="mt-auto pt-2 border-t border-gray-300 border-opacity-50 text-[11px] italic">👤 ${monitorStr} (monitoring)</div>`;
                    } else if (isOwned) {
                        content += `<div class="mt-auto pt-2 border-t border-gray-300 border-opacity-50 text-[11px] font-medium text-gray-900">👤 ${formatOwners(topic.owners)}</div>`;
                    }

                    card.innerHTML = content;
                    cell.appendChild(card);
                });
            }

            return cell;
        }

        function getRoomColorClasses(room) {
            switch(room) {
                case 'main': return 'bg-blue-50 border-blue-200 text-blue-900';
                case 'br1': return 'bg-teal-50 border-teal-200 text-teal-900';
                case 'br2': return 'bg-purple-50 border-purple-200 text-purple-900';
                case 'adhoc': return 'bg-orange-50 border-orange-200 text-orange-900';
                case 'br4': return 'bg-emerald-50 border-emerald-200 text-emerald-900';
                default: return 'bg-white border-gray-200 text-gray-800';
            }
        }

        function formatOwners(owners) {
            if (!owners) return "";
            if (owners.length === 1 && (owners[0] === 'Xinyan' || owners[0] === 'Hongjun')) {
                return `${owners[0]} (Home Support)`;
            }
            return owners.join(" / ");
        }

        function detectConflicts(slot) {
            const delegatesInSlot = {};
            const conflicts = [];
            const rooms = ['main', 'br1', 'br2', 'adhoc', 'br4'];
            
            rooms.forEach(room => {
                if (slot.rooms && slot.rooms[room]) {
                    slot.rooms[room].forEach(topic => {
                        if (!topic.isBreak && topic.owners && !topic.isMonitoring) {
                            topic.owners.forEach(owner => {
                                if (!delegatesInSlot[owner]) delegatesInSlot[owner] = new Set();
                                delegatesInSlot[owner].add(room);
                            });
                        }
                    });
                }
            });

            for (const [owner, roomSet] of Object.entries(delegatesInSlot)) {
                if (roomSet.size > 1) { 
                    conflicts.push({ owner, time: slot.time });
                }
            }
            return conflicts;
        }

        function handleConflicts(allConflicts) {
            const conflictBanner = document.getElementById('conflictBanner');
            const conflictText = document.getElementById('conflictText');
            
            let visibleConflicts = allConflicts;
            if (currentDelegate !== "ALL") {
                visibleConflicts = allConflicts.filter(c => c.owner === currentDelegate);
            }

            if (visibleConflicts.length > 0) {
                conflictBanner.classList.remove('hidden');
                
                const grouped = {};
                visibleConflicts.forEach(c => {
                    if (!grouped[c.owner]) grouped[c.owner] = [];
                    grouped[c.owner].push(c.time);
                });

                let msg = '<strong>Schedule Conflicts Detected!</strong><br/>';
                for (const [owner, times] of Object.entries(grouped)) {
                    msg += `- ${owner} is double-booked across different rooms at: ${times.join(', ')}<br/>`;
                }
                conflictText.innerHTML = msg;
            } else {
                conflictBanner.classList.add('hidden');
            }
        }
    </script>
