":[],"RAN4 Breakout 2 (BR2)(Gene Session)":[],"Ad hoc room":[]}},{"time":"15:00-EOM","is_break":false,"break_title":"","rooms":{"RAN4 Main (Yang Session)":[{"text":"Joint RAN1/RAN4 session on 6G in RAN1 main session","owners":[],"raw_delegates":[]}],"RAN4  Breakout 1(BR1) (Shan Session)":[{"text":"Return to (final round)","owners":[],"raw_delegates":[]}],"RAN4 Breakout 2 (BR2)(Gene Session)":[{"text":"Return to (final round)","owners":[],"raw_delegates":[]}],"Ad hoc room":[]}}]}};
        let currentDay = "Monday";
        
        function getRoomColorClass(roomName) {
            const lower = roomName.toLowerCase();
            if (lower.includes("main")) return "bg-Main";
            if (lower.includes("shan")) return "bg-Shan";
            if (lower.includes("gene")) return "bg-Gene";
            if (lower.includes("ad hoc") || lower.includes("ad-hoc")) return "bg-Adhoc";
            if (lower.includes("br4")) return "bg-BR4";
            return "bg-gray-200";
        }
        
        function initTabs() {
            const tabsDiv = document.getElementById("tabs");
            tabsDiv.innerHTML = "";
            const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
            days.forEach(day => {
                if (!scheduleData[day]) return;
                const btn = document.createElement("button");
                btn.className = `px-6 py-3 font-semibold text-lg focus:outline-none rounded-t-lg transition-colors ${day === currentDay ? 'bg-blue-500 text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200 border-t border-x border-gray-200'}`;
                btn.innerText = day;
                btn.onclick = () => {
                    currentDay = day;
                    initTabs();
                    renderSchedule();
                };
                tabsDiv.appendChild(btn);
            });
        }
        
        function getCollisions(timeSlot, selectedDelegate) {
            const delegateRooms = {};
            const collisions = new Set();
            
            for (const [room, cards] of Object.entries(timeSlot.rooms)) {
                cards.forEach(card => {
                    card.raw_delegates.forEach(d => {
                        if (!delegateRooms[d]) delegateRooms[d] = new Set();
                        delegateRooms[d].add(room);
                    });
                });
            }
            
            for (const [d, rooms] of Object.entries(delegateRooms)) {
                if (rooms.size > 1) {
                    if (selectedDelegate === "ALL" || selectedDelegate === d) {
                        collisions.add(d);
                    }
                }
            }
            return collisions;
        }

        function renderSchedule() {
            const container = document.getElementById("scheduleContainer");
            const delegateSelect = document.getElementById("delegateSelect").value;
            const data = scheduleData[currentDay];
            
            if (!data) {
                container.innerHTML = "<p class='text-center text-gray-500 p-8'>No schedule data for this day.</p>";
                return;
            }
            
            const rooms = data.rooms;
            const totalCols = rooms.length + 1; 
            
            let html = `<div class="grid" style="grid-template-columns: 120px repeat(${rooms.length}, minmax(0, 1fr));">`;
            
            // Headers
            html += `<div class="bg-gray-100 font-bold p-3 border-r border-b border-gray-200 flex items-center justify-center text-center">Time</div>`;
            rooms.forEach(room => {
                html += `<div class="bg-gray-100 font-bold p-3 border-r border-b border-gray-200 flex items-center justify-center text-center leading-snug">${room.replace(/\n/g, '<br>')}</div>`;
            });
            
            // Rows
            data.schedule.forEach(slot => {
                let hasItems = false;
                if (slot.is_break) {
                    Object.values(slot.rooms).forEach(cards => {
                        if (cards && cards.length > 0) hasItems = true;
                    });
                }

                // Time Cell
                const timeCellSpan = (slot.is_break && !hasItems) ? 1 : 1;
                html += `<div class="p-3 border-r border-b border-gray-200 flex items-center justify-center font-semibold text-center whitespace-nowrap bg-white" style="grid-column: span ${timeCellSpan};">${slot.time}</div>`;
                
                if (slot.is_break && !hasItems) {
                    html += `<div class="p-3 border-r border-b border-gray-200 bg-break flex items-center justify-center text-lg" style="grid-column: span ${rooms.length};">${slot.break_title}</div>`;
                } else {
                    const collisions = getCollisions(slot, delegateSelect);
                    
                    rooms.forEach(room => {
                        html += `<div class="p-2 border-r border-b border-gray-200 h-full flex flex-col gap-2 bg-white">`;
                        const cards = slot.rooms[room] || [];
                        
                        if (slot.is_break && cards.length === 0) {
                             html += `<div class="bg-break flex-1 flex items-center justify-center rounded p-2 text-center shadow-sm">${slot.break_title}</div>`;
                        } else {
                            cards.forEach(card => {
                                const hasOwner = card.raw_delegates && card.raw_delegates.length > 0;
                                let baseClass = hasOwner ? getRoomColorClass(room) : "gray-out";
                                let extraClass = "";
                                
                                if (delegateSelect !== "ALL" && card.raw_delegates.includes(delegateSelect)) {
                                    extraClass += " ring-4 ring-red-500 shadow-lg scale-[1.02] transform transition-transform z-10 ";
                                }
                                
                                const hasCollision = card.raw_delegates.some(d => collisions.has(d));
                                if (hasCollision) {
                                    extraClass += " border-[3px] border-red-600 shadow-md ";
                                }
                                
                                const textHtml = card.text.replace(/\n/g, '<br>');
                                
                                html += `<div class="p-3 rounded-lg shadow-sm flex-1 flex flex-col ${baseClass} ${extraClass}">`;
                                html += `<div class="font-medium mb-3 whitespace-pre-wrap flex-grow leading-snug">${textHtml}</div>`;
                                
                                if (hasOwner) {
                                    let ownerHtml = card.owners.map(o => {
                                        const rawName = o.split(' ')[0];
                                        const isCol = collisions.has(rawName);
                                        const colBadge = isCol ? `<span class="bg-red-600 text-white text-[10px] uppercase font-bold px-1.5 py-0.5 rounded ml-2 align-middle">Conflict</span>` : '';
                                        const lowlight = o.includes('monitoring') ? 'opacity-60 italic font-normal' : 'font-semibold';
                                        return `<div class="text-sm mt-1 text-gray-900 bg-white/50 px-2 py-1 rounded inline-block w-full ${lowlight}">👤 ${o} ${colBadge}</div>`;
                                    }).join('<div class="h-1"></div>');
                                    html += `<div>${ownerHtml}</div>`;
                                }
                                
                                html += `</div>`;
                            });
                        }
                        
                        html += `</div>`;
                    });
                }
            });
            
            html += `</div>`; 
            container.innerHTML = html;
        }

        document.getElementById("delegateSelect").addEventListener("change", renderSchedule);
        
        initTabs();
        renderSchedule();
    </script>
