                btn.innerText = dayData.day;
                btn.onclick = () => {
                    currentDay = dayData.day;
                    setupTabs();
                    renderSchedule();
                };
                tabsContainer.appendChild(btn);
            });

                    return;
                }

                // Pre-compute delegate positions in this time slot for collision detection
                let slotDelegates = {};
                ['main', 'br1', 'br2', 'adhoc'].forEach(room => {
                    (slot[room] || []).forEach(block => {
                        if (block.topics) {
                            block.topics.forEach(tId => {
                                (topicOwners[tId] || []).forEach(o => {
                                    const cleanName = o.replace(' (Monitoring)', '').replace(' (Home Support)', '');
                                    if(cleanName === "(Monitoring)" || cleanName === "N/A") return;
                                    if(!slotDelegates[cleanName]) slotDelegates[cleanName] = new Set();
                                    slotDelegates[cleanName].add(room);
                                });
                            });
                        }
                    });
                });

                html += `<tr>
                    <td class="border p-2 font-bold whitespace-nowrap bg-white text-gray-700">${slot.time}</td>`;

                ['main', 'br1', 'br2', 'adhoc'].forEach(room => {
                    html += `<td class="border p-2 h-full bg-white"><div class="h-full flex flex-col gap-2">`;
                    const blocks = slot[room] || [];
                    
                    blocks.forEach(block => {
                        if (block.isHeader) {
                            html += `<div class="font-bold text-xs uppercase tracking-wide text-gray-500 mt-1 mb-1">${block.text.replace(/\n/g, '<br>')}</div>`;
                        } else {
                            let owners = [];
                            if (block.topics) {
                                block.topics.forEach(t => {
                                    if (topicOwners[t]) owners.push(...topicOwners[t]);
                                });
                            }
                            owners = [...new Set(owners)]; // Deduplicate

                            let hasRealOwner = owners.some(o => o !== "(Monitoring)" && o !== "N/A (Monitoring)" && o !== "N/A");
                            
                            // Highlight filtering
                            let isGrayedOut = !hasRealOwner;
                            if (selectedDelegate !== 'All' && !owners.some(o => o.includes(selectedDelegate))) {
                                isGrayedOut = true;
                            }

                            // Theming Rules
                            let bgClass = "bg-gray-100 text-gray-400 border-gray-200 opacity-75"; 
                            if (!isGrayedOut) {
                                if (room === 'main') bgClass = "bg-blue-50 border-blue-200 text-blue-900";
                                if (room === 'br1') bgClass = "bg-teal-50 border-teal-200 text-teal-900";
                                if (room === 'br2') bgClass = "bg-purple-50 border-purple-200 text-purple-900";
                                if (room === 'adhoc') bgClass = "bg-orange-50 border-orange-200 text-orange-900";
                            }

                            html += `<div class="flex-1 border rounded p-2 shadow-sm flex flex-col justify-between ${bgClass}">
                                <div class="mb-3 font-medium whitespace-pre-wrap">${block.text}</div>
                                <div class="flex flex-wrap gap-1 mt-auto">`;

                            if (!hasRealOwner) {
                                html += `<span class="text-xs px-2 py-1 bg-gray-200 text-gray-500 rounded">👤 None</span>`;
                            } else {
                                owners.forEach(o => {
                                    if(o === "(Monitoring)" || o === "N/A (Monitoring)") return;
                                    
                                    const cleanName = o.replace(' (Monitoring)', '').replace(' (Home Support)', '');
                                    const isMonitoring = o.includes('(Monitoring)');
                                    
                                    // Home Support logic
                                    let dispName = o;
                                    if (owners.length === 1 && (cleanName === 'Xinyan' || cleanName === 'Hongjun')) {
                                        dispName = cleanName + ' (Home Support)';
                                    }

                                    // Collision Check logic
                                    let isConflict = slotDelegates[cleanName] && slotDelegates[cleanName].size > 1;
                                    let showConflict = isConflict && (selectedDelegate === 'All' || selectedDelegate === cleanName);

                                    let badgeClass = isMonitoring ? "bg-gray-200 text-gray-500 border-dashed border-gray-400" : "bg-white border-gray-300 shadow-sm font-semibold text-gray-800";
                                    if (isGrayedOut) badgeClass = "bg-gray-200 text-gray-400 border-transparent";
                                    else if (showConflict) badgeClass += " border-red-500 ring-1 ring-red-500 text-red-700 bg-red-50";

                                    html += `<span class="text-[11px] px-2 py-0.5 border rounded flex items-center gap-1 ${badgeClass}">
                                        👤 ${dispName}
                                        ${showConflict ? '<span title="Schedule Conflict!">⚠️</span>' : ''}
                                    </span>`;
                                });
                            }
                            html += `</div></div>`;
                        }
                    });
                    html += `</div></td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // Initialize App
        setupTabs();
        renderSchedule();
    </script>
</body>
</html>
